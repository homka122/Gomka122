syntax = "proto3";

package processor;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/homka122/Gomka122/proto/processor";

service ProcessorService {
  rpc GetRepository(GetRepositoryRequest) returns (GetRepositoryResponse);
  rpc GetSubscribedRepository(GetSubscribedRepositoryRequest) returns (GetSubscribedRepositoryResponse);
  rpc Ping(PingRequest) returns (PingResponse);
}

message GetRepositoryRequest {
  string owner = 1;
  string repo = 2;
}

enum RepositoryStatus {
  REPOSITORY_STATUS_UNSPECIFIED = 0;
  REPOSITORY_STATUS_READY = 1;
  REPOSITORY_STATUS_PREPARING = 2;
  REPOSITORY_STATUS_NOT_FOUND = 3;
  REPOSITORY_STATUS_FAILED = 4;
}

message Repository {
  string name = 1;
  string description = 2;
  int32 stars = 3;
  int32 forks = 4;
  google.protobuf.Timestamp create_date = 5;
  RepositoryStatus status = 6;
}

message GetRepositoryResponse {
  Repository repository = 1;
}

message PingRequest {}

message PingResponse {
  string reply = 1;
}

message GetSubscribedRepositoryRequest {}

message GetSubscribedRepositoryResponse {
  repeated Repository repositories = 1;
}
