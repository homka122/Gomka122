name: CI

on:
  push:
  pull_request:

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build packages
        run: go build ./...

  compose:
    name: Compose smoke test
    runs-on: ubuntu-latest
    needs: go
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build compose services
        run: docker compose build

      - name: Start compose services
        run: docker compose up -d

      - name: Wait for gateway
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/docs/swagger/doc.json >/dev/null; then
              exit 0
            fi

            docker compose ps
            sleep 2
          done

          docker compose logs
          exit 1

      - name: Check services are running
        run: |
          docker compose ps
          docker compose ps --services --status running | grep -qx gateway
          docker compose ps --services --status running | grep -qx processor
          docker compose ps --services --status running | grep -qx collector
          docker compose ps --services --status running | grep -qx subscriber

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop compose services
        if: always()
        run: docker compose down --volumes --remove-orphans
